<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="360" viewBox="0 0 1320 360" role="img" aria-label="LintForge — Pluggable static analysis for Dart &amp; Flutter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111C30"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B"/><stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <rect width="1320" height="360" fill="url(#bg)"/>

  <!-- mark: dark rounded badge + <LF> monogram (nested 512-canvas, scaled to 248px) -->
  <svg x="56" y="56" width="248" height="248" viewBox="0 0 512 512">
    <rect x="26" y="26" width="460" height="460" rx="101.2" fill="url(#badge)" stroke="#334155" stroke-width="5.5"/>
    <g fill="none" stroke="#64748B" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="159,194 119,256 159,318"/>
      <polyline points="353,194 393,256 353,318"/>
    </g>
    <path d="M 199 192 L 199 320 L 243 320" fill="none" stroke="#E2E8F0" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 285 192 L 285 320 M 285 192 L 329 192 M 285 254 L 321 254" fill="none" stroke="#FBBF24" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- wordmark: lint (white) + forge (amber) -->
  <text x="348" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="118" font-weight="700" letter-spacing="-1">
    <tspan fill="#E2E8F0">Lint</tspan><tspan fill="#FBBF24">Forge</tspan>
  </text>
  <!-- tagline -->
  <text x="352" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="400" fill="#94A3B8">Pluggable static analysis for Dart &amp; Flutter</text>
</svg>
