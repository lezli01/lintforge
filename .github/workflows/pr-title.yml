name: PR Title

# Enforces that PR titles follow Conventional Commits. For single-commit PRs,
# also verifies the commit title so rebase/squash histories stay releasable.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commits format
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          conventional_re='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$'

          validate_title() {
            local value="$1"
            local label="$2"

            if [[ ! "$value" =~ $conventional_re ]]; then
              echo "::error::$label must follow Conventional Commits: type(scope): subject"
              exit 1
            fi

            local subject="${value#*: }"
            local first_char="${subject:0:1}"
            if [[ "$first_char" =~ [[:upper:]] ]]; then
              echo "::error::$label subject must not start with an uppercase letter."
              exit 1
            fi
          }

          pr_title="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.title')"
          validate_title "$pr_title" "PR title"

          commit_count="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.commits')"
          if [ "$commit_count" = "1" ]; then
            commit_title="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/commits" --jq '.[0].commit.message | split("\n")[0]')"
            validate_title "$commit_title" "Single commit title"

            if [ "$commit_title" != "$pr_title" ]; then
              echo "::error::Single commit title must match the PR title."
              exit 1
            fi
          fi
