name: PR Title

# Enforces that PR titles follow Conventional Commits. For single-commit PRs,
# also verifies the commit title so rebase/squash histories stay releasable.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commits format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types mirror the list in CLAUDE.md.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          validateSingleCommit: true
          validateSingleCommitMatchesPrTitle: true
          # Subject (text after "type(scope): ") must not start with an
          # uppercase letter, to keep summaries in imperative lowercase.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            didn't match the configured pattern. Please ensure that the
            subject starts with a lowercase letter.
