name: Release Please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Needed so this workflow can dispatch publish.yml on the new tag.
  # GITHUB_TOKEN-pushed tags do not trigger downstream `on: push: tags`
  # workflows, so we kick off publish.yml explicitly via the API.
  actions: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Uses release-please-config.json and .release-please-manifest.json
          # from the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger checks for release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        shell: bash
        run: |
          set -euo pipefail

          read -r branch number < <(
            node -e 'const raw = process.env.RELEASE_PRS || (process.env.RELEASE_PR ? `[${process.env.RELEASE_PR}]` : "[]"); const prs = JSON.parse(raw); const pr = prs[0] || {}; console.log(`${pr.headBranchName || ""} ${pr.number || ""}`);'
          )

          if [ -z "$branch" ]; then
            echo "No release PR branch reported by release-please."
            exit 0
          fi

          gh workflow run ci.yml --repo "${{ github.repository }}" --ref "$branch"
          gh workflow run gitleaks.yml --repo "${{ github.repository }}" --ref "$branch"

          if [ -n "$number" ]; then
            gh workflow run pr-title.yml \
              --repo "${{ github.repository }}" \
              --ref "$branch" \
              -f pr_number="$number"
          fi

      - name: Trigger pub.dev publish for new tag
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh workflow run publish.yml
          --repo "${{ github.repository }}"
          --ref "${{ steps.release.outputs.tag_name }}"
