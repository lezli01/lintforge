name: Release Please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Needed so this workflow can dispatch publish.yml on the new tag.
  # GITHUB_TOKEN-pushed tags do not trigger downstream `on: push: tags`
  # workflows, so we kick off publish.yml explicitly via the API.
  actions: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Uses release-please-config.json and .release-please-manifest.json
          # from the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger pub.dev publish for new tag
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh workflow run publish.yml
          --repo "${{ github.repository }}"
          --ref "${{ steps.release.outputs.tag_name }}"
