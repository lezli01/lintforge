name: lintforge
description: LintForge is a pluggable static analysis tool for Dart and Flutter projects with an extensible runner, rule registry, and a standalone CLI you install globally.
version: 0.4.2
homepage: https://github.com/lezli01/lintforge
repository: https://github.com/lezli01/lintforge
issue_tracker: https://github.com/lezli01/lintforge/issues
topics:
  - analyzer
  - cli
  - flutter
  - lint
  - static-analysis

environment:
  sdk: ^3.12.0

executables:
  lintforge: lintforge

dependencies:
  analyzer: ">=13.3.0 <14.0.0"
  path: ^1.9.0
  glob: ^2.1.2
  args: ^2.5.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
