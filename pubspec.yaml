name: lintforge
description: A pluggable static analysis framework for Dart and Flutter projects with an extensible runner, rule registry, and CLI.
version: 0.3.8
homepage: https://github.com/lezli01/lintforge
repository: https://github.com/lezli01/lintforge
issue_tracker: https://github.com/lezli01/lintforge/issues
topics:
  - analyzer
  - cli
  - flutter
  - lint
  - static-analysis

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

executables:
  lintforge: lintforge

dependencies:
  flutter:
    sdk: flutter
  analyzer: ">=13.0.0 <14.0.0"
  path: ^1.9.0
  glob: ^2.1.2
  args: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
